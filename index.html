<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Assessment Portal</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --muted:#5b6475;
      --text:#111827;
      --line:rgba(17,24,39,.12);
      --btn:#2563eb;
      --ok:#059669;
      --err:#b91c1c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1180px;margin:0 auto;padding:22px 16px 56px;}
    h1{font-size:22px;margin:0 0 12px;}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      box-shadow:0 6px 18px rgba(17,24,39,.06);
    }
    .grid{display:grid;gap:12px;}
    @media (min-width:980px){ .grid{grid-template-columns: 1.25fr .75fr;} }

    .topbar{display:grid;gap:10px;grid-template-columns:1fr;}
    @media (min-width:820px){ .topbar{grid-template-columns: 1.2fr .8fr;} }

    .label{font-size:12px;color:var(--muted);margin:0 0 6px}
    select,input{
      width:100%;
      padding:9px 10px;
      border-radius:10px;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    select:focus,input:focus{outline:none;border-color:rgba(37,99,235,.55)}

    .scaleBox{
      margin-top:10px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:10px 12px;
    }
    .scaleTitle{font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:700}
    .scaleList{margin:0;padding-left:18px;font-size:13px;line-height:1.35}
    .scaleList li{margin:2px 0}

    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
    button{cursor:pointer;border:0;border-radius:10px;padding:10px 12px;font-weight:650}
    .primary{background:var(--btn);color:white}
    .ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
    .ghost:hover{border-color:rgba(17,24,39,.22)}
    .small{font-size:12px;color:var(--muted)}
    .divider{height:1px;background:var(--line);margin:14px 0}

    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
    th{color:var(--muted);font-weight:700;font-size:12px;text-align:left}
    td.n{width:56px;color:var(--muted);font-size:12px}
    td.r{width:170px}
    td.q{font-size:13px;line-height:1.3}

    .sticky{position:sticky;top:14px}
    .kv{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:10px 0}
    .k{color:var(--muted);font-size:13px}
    .v{font-weight:800;font-variant-numeric:tabular-nums}
    .ok{color:var(--ok);font-weight:700}
    .err{color:var(--err);font-weight:700}

    /* SAW UI */
    .sawTools{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-top:10px}
    .mini{max-width:240px}
    .btnSm{padding:8px 10px;border-radius:10px}
    .num{font-variant-numeric:tabular-nums}
    .right{text-align:right}
    .center{text-align:center}
    .nowrap{white-space:nowrap}

    /* SAW Want input - MORE VISIBLE */
    .wantInput{
      width:100%;
      min-width:240px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(17,24,39,.22);
      font-size:14px;
      font-weight:650;
      background:#ffffff;
    }
    .wantInput::placeholder{ color: rgba(91,100,117,.95); }

    /* SAW table polish */
    .sawWrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff;margin-top:10px}
    table.saw{width:100%;border-collapse:separate;border-spacing:0}
    table.saw th, table.saw td{border-bottom:1px solid var(--line)}
    table.saw thead th{
      position:sticky; top:0; z-index:2;
      background:#fafafa;
    }
    table.saw thead tr:nth-child(2) th{ top: 38px; z-index:3; }
    table.saw tbody tr:nth-child(even){background:#fcfcfd}
    table.saw td, table.saw th{padding:10px}
    .sawScoreCell{
      background:#f8fafc;
      color:#111827;
      font-weight:800;
    }
    .sawAltHeader{font-size:12px;color:var(--text);font-weight:800}
    .sawSubHeader{font-size:11px;color:var(--muted);font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Assessment Portal</h1>

    <section class="card">
      <div class="topbar">
        <div>
          <div class="label">Assessment</div>
          <select id="assessmentSelect">
            <option value="ibq">Influence Behavior Questionnaire (IBQ)</option>
            <option value="conflict">Strategies for Handling Conflict Survey</option>
            <option value="saw">Simple Additive Weighting</option>
          </select>
        </div>
        <div>
          <div class="label">Student name</div>
          <input type="text" id="studentName" placeholder="e.g., Jane Doe" />
        </div>
      </div>

      <div class="scaleBox">
        <div class="scaleTitle">Scale meaning</div>
        <ul class="scaleList" id="scaleMeaning"></ul>
      </div>
    </section>

    <div class="grid" style="margin-top:12px">
      <section class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px">
          <h2 id="qTitle" style="margin:0;font-size:16px">Questions</h2>
          <span class="small" id="reqText">All items are required.</span>
        </div>

        <div id="questionArea"></div>

        <div class="controls">
          <button class="primary" id="btnCalc" type="button">Calculate</button>
          <button class="ghost" id="btnPDF" type="button">Download PDF</button>
          <button class="ghost" id="btnReset" type="button">Reset</button>
          <span class="small" id="statusText"></span>
        </div>
      </section>

      <aside class="card sticky">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px">
          <h2 style="margin:0;font-size:16px">Results</h2>
          <span class="small" id="answeredCount">0/0 answered</span>
        </div>

        <div id="primaryBlock" style="display:none">
          <div class="kv"><div class="k">Primary strategy</div><div class="v" id="primaryVal">—</div></div>
          <div class="kv"><div class="k">Secondary strategy</div><div class="v" id="secondaryVal">—</div></div>
          <div class="divider"></div>
        </div>

        <div class="kv" id="overallRow">
          <div class="k" id="overallLabel">Overall average</div>
          <div class="v" id="overallVal">—</div>
        </div>

        <div class="divider"></div>
        <div id="dimensionResults"></div>
      </aside>
    </div>
  </div>

<script>
/* -------------------- Scales -------------------- */
const IBQ_SCALE = [
 "1 - I can't remember ever using this tactic with others",
  "2 - I very seldom use this tactic with others",
  "3 - I occasionally use this tactic with others",
  "4 - I use this tactic moderately often with others",
  "5 - I use this tactic very often with others"
];

const CONFLICT_SCALE = [
  "1 - rarely",
  "2 - between rarely and somewhat",
  "3 - somewhat",
  "4 - between somewhat and always",
  "5 - always"
];

const SAW_SCALE = [
  "Weights: 0 - 10 (importance of each want)",
  "Ratings: 0 - 10 (how well each alternative satisfies each want)"
];

/* -------------------- Questions -------------------- */
const IBQ_QUESTIONS = {
  1:"Uses facts and logic to make a persuasive case for a request or proposal.",
  2:"Explains clearly why a request or proposed change is necessary to attain a task objective.",
  3:"Explains why a proposed project or change would be practical and cost effective.",
  4:"Provides information or evidence to show that a proposed activity or change is likely to be successful.",
  5:"Offers something you want in return for your help on a task or project.",
  6:"Offers to do something for you in exchange for carrying out a request.",
  7:"Offers to do a specific task or favor for you in return for your help and support.",
  8:"Offers to do something for you in the future in return for your help now.",
  9:"Says a proposed activity or change is an opportunity to do something really exciting and worthwhile.",
  10:"Describes a clear, inspiring vision of what a proposed project or change could accomplish.",
  11:"Talks about ideals and values when proposing a new activity or change.",
  12:"Makes an inspiring speech or presentation to arouse enthusiasm for a proposed activity or change.",
  13:"Says that his/her request or proposal is consistent with official rules and policies.",
  14:"Says that a request or proposal is consistent with a prior agreement or contract.",
  15:"Verifies that a request is legitimate by referring to a document such as a work order, policy manual, charter, bylaws, or formal contract.",
  16:"Says that a request or proposal is consistent with prior precedent and established practice.",
  17:"Explains how the task he/she wants you to do could help your career.",
  18:"Describes benefits you could gain from doing a task or activity (e.g., learn new skills, meet important people, enhance your reputation).",
  19:"Explains how a proposed activity or change could help you attain a personal objective.",
  20:"Explains why a proposed activity or change would be good for you.",
  21:"Demands that you carry out a request.",
  22:"Uses threats or warnings when trying to get you to do something.",
  23:"Repeatedly checks to see if you have carried out a request.",
  24:"Tries to pressure you to carry out a request.",
  25:"Offers to help with a task that he/she wants you to carry out.",
  26:"Offers to provide resources you would need to do a task for him/her.",
  27:"Offers to show you how to do a task that he/she wants you to carry out.",
  28:"Offers to provide any assistance you would need to carry out a request.",
  29:"Says you have the special skills or knowledge needed to carry out a request.",
  30:"Praises your past performance or achievements when asking you to do a task for him/her.",
  31:"Praises your skill or knowledge when asking you to do something.",
  32:"Says you are the most qualified person for a task that he/she wants you to do.",
  33:"Asks you to suggest things you could do to help him/her achieve a task objective or resolve a problem.",
  34:"Consults with you to get your ideas about a proposed activity or change that he/she wants you to support or implement.",
  35:"Encourages you to express any concerns you may have about a proposed activity or change that he/she wants you to support or implement.",
  36:"Invites you to suggest ways to improve a preliminary plan or proposal that he/she wants you to support or help implement.",
  37:"Appeals to your friendship when asking you to do something.",
  38:"Says he/she needs to ask for a favor before telling you what it is.",
  39:"Asks you as a friend to do a favor for him/her.",
  40:"Asks for your help as a personal favor.",
  41:"Mentions the names of other people who endorse a proposal when asking you to support it.",
  42:"Gets others to explain to you why they support a proposed activity or change that he/she wants you to support or help implement.",
  43:"Brings someone along for support when meeting with you to make a request or proposal.",
  44:"Asks someone you respect to help influence you to carry out a request or support a proposal."
};

// EXACT sentences provided, in order 1–20:
const CONFLICT_QUESTIONS = {
  1:"I argue my position tenaciously.",
  2:"I put the needs of other parties to the conflict before my own.",
  3:"I arrive at a compromise all parties can accept.",
  4:"I try not to get involved in conflicts.",
  5:"I investigate issues thoroughly and jointly.",
  6:"During conflicts I try to find fault in others’ positions.",
  7:"I foster harmony.",
  8:"I negotiate to get a portion of what I propose.",
  9:"I avoid discussing the most controversial aspects of a conflict openly.",
  10:"I openly share information with others in resolving disagreements.",
  11:"I enjoy winning an argument.",
  12:"I am inclined to go along with the suggestions of other parties to a conflict.",
  13:"I look for a middle ground to resolve disagreements.",
  14:"To avoid hard feelings, I keep my true feelings to myself.",
  15:"I encourage the open sharing of concerns and issues.",
  16:"I am reluctant to admit I am wrong.",
  17:"I try to help others avoid “losing face” in a conflict.",
  18:"I stress the advantage of “give and take.”",
  19:"I encourage others to take the lead in resolving controversy.",
  20:"When stating my position I stress that it is only one point of view."
};

/* -------------------- Scoring groups -------------------- */
const IBQ_TACTICS = [
  { name: "Rational persuasion", items: [1,2,3,4] },
  { name: "Exchange", items: [5,6,7,8] },
  { name: "Inspirational appeal", items: [9,10,11,12] },
  { name: "Legitimating", items: [13,14,15,16] },
  { name: "Apprising", items: [17,18,19,20] },
  { name: "Pressure", items: [21,22,23,24] },
  { name: "Collaboration", items: [25,26,27,28] },
  { name: "Ingratiation", items: [29,30,31,32] },
  { name: "Consultation", items: [33,34,35,36] },
  { name: "Personal Appeals", items: [37,38,39,40] },
  { name: "Coalition", items: [41,42,43,44] },
];

const CONFLICT_STRATEGIES = [
  { name: "Forcing", items: [1,6,11,16] },
  { name: "Accommodating", items: [2,7,12,17] },
  { name: "Compromising", items: [3,8,13,18] },
  { name: "Avoiding", items: [4,9,14,19] },
  { name: "Integrating", items: [5,10,15,20] },
];

/* -------------------- State -------------------- */
let state = {
  active: "ibq",
  calculated: false,
  saw: {
    alternatives: ["Finance", "Leadership", "Design", "Advertising"],
    wants: [] // { id, name, weight, ratings: {altName: number} }
  }
};

/* -------------------- Helpers -------------------- */
function setStatus(html){ document.getElementById("statusText").innerHTML = html || ""; }
function setAnsweredCount(a,b){ document.getElementById("answeredCount").textContent = `${a}/${b} answered`; }

function renderScale(list){
  document.getElementById("scaleMeaning").innerHTML = list.map(x=>`<li>${escapeHtml(x)}</li>`).join("");
}

function avg(nums){ return nums.reduce((a,b)=>a+b,0)/nums.length; }
function sum(nums){ return nums.reduce((a,b)=>a+b,0); }

function clearResultsPanel(){
  document.getElementById("primaryBlock").style.display = "none";
  document.getElementById("overallRow").style.display = "flex";
  document.getElementById("overallLabel").textContent = "Overall average";
  document.getElementById("overallVal").textContent = "—";
  document.getElementById("primaryVal").textContent = "—";
  document.getElementById("secondaryVal").textContent = "—";
  document.getElementById("dimensionResults").innerHTML = "";
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeAttr(s){
  return escapeHtml(s).replaceAll("`","&#096;");
}
function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }

/* =========================================================
   Likert Surveys (IBQ / Conflict)
========================================================= */
function select15(){
  return `
    <select class="respSelect">
      <option value="0" selected disabled>Select…</option>
      <option value="1">1</option><option value="2">2</option><option value="3">3</option>
      <option value="4">4</option><option value="5">5</option>
    </select>`;
}

function renderLikertSurvey(kind){
  const isIBQ = kind === "ibq";
  const questions = isIBQ ? IBQ_QUESTIONS : CONFLICT_QUESTIONS;
  const total = isIBQ ? 44 : 20;

  document.getElementById("qTitle").textContent = isIBQ
    ? "Influence Behavior Questionnaire (IBQ)"
    : "Strategies for Handling Conflict Survey";

  document.getElementById("reqText").textContent = "All items are required.";
  state.calculated = false;
  setStatus("");
  clearResultsPanel();
  setAnsweredCount(0, total);

  const rows = Array.from({length: total}, (_,i)=>i+1).map(n => `
    <tr>
      <td class="n">${n}</td>
      <td class="q">${escapeHtml(questions[n])}</td>
      <td class="r">${select15()}</td>
    </tr>
  `).join("");

  document.getElementById("questionArea").innerHTML = `
    <table>
      <thead>
        <tr><th style="width:56px">#</th><th>Item</th><th style="width:170px">Response</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  document.querySelectorAll(".respSelect").forEach(sel=>{
    sel.value = "0";
    sel.addEventListener("change", ()=>{
      state.calculated = false;
      setStatus("");
      clearResultsPanel();
      setAnsweredCount(countAnsweredLikert(total), total);
    });
  });
}

function countAnsweredLikert(total){
  let answered = 0;
  document.querySelectorAll(".respSelect").forEach(sel=>{
    const v = Number(sel.value);
    if (v >= 1 && v <= 5) answered++;
  });
  return answered;
}

function getLikertResponses(total){
  const r = {};
  const selects = document.querySelectorAll(".respSelect");
  for(let i=0;i<total;i++){
    r[i+1] = Number(selects[i].value);
  }
  return r;
}

function computeIBQ(r){
  const all = Array.from({length:44},(_,i)=>r[i+1]);
  const overall = avg(all);
  const dims = IBQ_TACTICS.map(t => ({ name: t.name, score: avg(t.items.map(i=>r[i])) }));
  return { overall, dims, primary:null, secondary:null };
}

function computeConflict(r){
  const totals = CONFLICT_STRATEGIES.map(s => ({ name: s.name, score: sum(s.items.map(i=>r[i])) }));
  const sorted = [...totals].sort((a,b)=>b.score-a.score);
  return {
    overall:null,
    dims: totals,
    primary: `${sorted[0].name} (${sorted[0].score})`,
    secondary: `${sorted[1].name} (${sorted[1].score})`
  };
}

function renderLikertResults(res){
  const isIBQ = state.active === "ibq";

  document.getElementById("primaryBlock").style.display = isIBQ ? "none" : "block";
  document.getElementById("overallRow").style.display = isIBQ ? "flex" : "none";

  if (isIBQ){
    document.getElementById("overallLabel").textContent = "Overall average";
    document.getElementById("overallVal").textContent = res.overall.toFixed(2);
  } else {
    document.getElementById("primaryVal").textContent = res.primary;
    document.getElementById("secondaryVal").textContent = res.secondary;
  }

  document.getElementById("dimensionResults").innerHTML = res.dims.map(d => `
    <div class="kv">
      <div class="k">${escapeHtml(d.name)}</div>
      <div class="v">${isIBQ ? d.score.toFixed(2) : Math.round(d.score)}</div>
    </div>
  `).join("");
}

/* =========================================================
   SAW: Simple Additive Weighting
========================================================= */
function renderSAW(){
  document.getElementById("qTitle").textContent = "Simple Additive Weighting";
  document.getElementById("reqText").textContent = "Add wants, then assign weights and ratings.";

  state.calculated = false;
  setStatus("");
  clearResultsPanel();

  document.getElementById("primaryBlock").style.display = "none";
  document.getElementById("overallRow").style.display = "flex";
  document.getElementById("overallLabel").textContent = "Top alternative";
  document.getElementById("overallVal").textContent = "—";
  document.getElementById("dimensionResults").innerHTML = "";
  setAnsweredCount(0, 0);

  document.getElementById("questionArea").innerHTML = `
    <div class="sawTools">
      <div class="mini">
        <div class="label">Add alternative</div>
        <input id="altInput" type="text" placeholder="e.g., Option A" />
      </div>
      <button class="ghost btnSm" id="btnAddAlt" type="button">Add Alternative</button>
      <button class="ghost btnSm" id="btnResetAlt" type="button">Reset Alternatives</button>
    </div>

    <div class="divider"></div>

    <div class="sawTools">
      <button class="ghost btnSm" id="btnAddWant" type="button">Add Want</button>
      <span class="small">Weights and ratings are 0–10.</span>
    </div>

    <div class="sawWrap">
      <table id="sawTable" class="saw"></table>
    </div>
  `;

  document.getElementById("btnAddAlt").onclick = () => {
    const v = (document.getElementById("altInput").value || "").trim();
    if (!v) return;
    if (state.saw.alternatives.includes(v)) return;

    state.saw.alternatives.push(v);
    state.saw.wants.forEach(w => { w.ratings[v] = 0; });

    state.calculated = false;
    setStatus("");
    document.getElementById("overallVal").textContent = "—";
    document.getElementById("dimensionResults").innerHTML = "";

    renderSAWTable();
    renderSAWAnsweredCount();
  };

  document.getElementById("btnResetAlt").onclick = () => {
    state.saw.alternatives = ["Finance", "Leadership", "Design", "Advertising"];
    state.saw.wants.forEach(w => {
      const newRatings = {};
      state.saw.alternatives.forEach(a => newRatings[a] = 0);
      w.ratings = newRatings;
    });

    state.calculated = false;
    setStatus("");
    document.getElementById("overallVal").textContent = "—";
    document.getElementById("dimensionResults").innerHTML = "";

    renderSAW();
  };

  document.getElementById("btnAddWant").onclick = () => {
    const id = uid();
    const ratings = {};
    state.saw.alternatives.forEach(a => ratings[a] = 0);
    state.saw.wants.push({ id, name:"", weight:0, ratings });

    state.calculated = false;
    setStatus("");
    document.getElementById("overallVal").textContent = "—";
    document.getElementById("dimensionResults").innerHTML = "";

    renderSAWTable();
    renderSAWAnsweredCount();
  };

  renderSAWTable();
  renderSAWAnsweredCount();
}

function renderSAWTable(){
  const table = document.getElementById("sawTable");
  if(!table) return;

  const alts = state.saw.alternatives;

  const headerAltRow1 = alts.map(a => `
    <th class="center sawAltHeader" colspan="2">${escapeHtml(a)}</th>
  `).join("");

  const headerAltRow2 = alts.map(() => `
    <th class="center sawSubHeader nowrap" style="min-width:90px">Rating</th>
    <th class="center sawSubHeader nowrap" style="min-width:90px">Score</th>
  `).join("");

  const rows = state.saw.wants.map((w, idx) => {
    const altCells = alts.map(a => {
      const ratingSel = `
        <select class="sawRating" data-want="${w.id}" data-alt="${escapeAttr(a)}">
          <option value="0" ${w.ratings[a]===0 ? "selected" : ""} disabled>Select…</option>
          ${Array.from({length:11},(_,i)=>`<option value="${i}" ${w.ratings[a]===i ? "selected":""}>${i}</option>`).join("")}
        </select>
      `;

      const scoreVal = (state.calculated && isSAWComplete())
        ? (Number(w.weight) * Number(w.ratings[a]))
        : "—";

      return `
        <td class="center" style="min-width:110px">${ratingSel}</td>
        <td class="center sawScoreCell num">${scoreVal}</td>
      `;
    }).join("");

    const weightSel = `
      <select class="sawWeight" data-want="${w.id}">
        <option value="0" ${w.weight===0 ? "selected":""} disabled>Select…</option>
        ${Array.from({length:11},(_,i)=>`<option value="${i}" ${w.weight===i ? "selected":""}>${i}</option>`).join("")}
      </select>
    `;

    return `
      <tr>
        <td class="n">${idx+1}</td>
        <td>
          <input class="sawWantName wantInput" data-want="${w.id}" type="text"
                 placeholder="Enter want..." value="${escapeAttr(w.name)}" />
        </td>
        <td class="center">${weightSel}</td>
        ${altCells}
        <td class="center">
          <button class="ghost btnSm" type="button" data-delwant="${w.id}">Remove</button>
        </td>
      </tr>
    `;
  }).join("");

  const totals = computeSAWTotals();
  const totalCells = alts.map(a => {
    const t = (state.calculated && isSAWComplete()) ? totals[a] : "—";
    return `
      <td class="center"></td>
      <td class="center sawScoreCell num"><b>${t}</b></td>
    `;
  }).join("");

  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:56px" rowspan="2">#</th>
        <th rowspan="2" style="min-width:300px">Want</th>
        <th class="center nowrap" style="width:140px" rowspan="2">Weight (0–10)</th>
        ${headerAltRow1}
        <th style="width:110px" rowspan="2"></th>
      </tr>
      <tr>
        ${headerAltRow2}
      </tr>
    </thead>

    <tbody>
      ${rows || `<tr><td colspan="${4 + alts.length*2}"><span class="small">Click “Add Want” to start.</span></td></tr>`}
    </tbody>

    <tfoot>
      <tr>
        <th colspan="3" class="right">Total score</th>
        ${totalCells}
        <th></th>
      </tr>
    </tfoot>
  `;

  document.querySelectorAll(".sawWantName").forEach(inp=>{
    inp.oninput = () => {
      const id = inp.dataset.want;
      const w = state.saw.wants.find(x=>x.id===id);
      if(w){ w.name = inp.value; }
      state.calculated = false;
      setStatus("");
      document.getElementById("overallVal").textContent = "—";
      document.getElementById("dimensionResults").innerHTML = "";
      renderSAWAnsweredCount();
    };
  });

  document.querySelectorAll(".sawWeight").forEach(sel=>{
    sel.onchange = () => {
      const id = sel.dataset.want;
      const w = state.saw.wants.find(x=>x.id===id);
      if(w){ w.weight = Number(sel.value); }
      state.calculated = false;
      setStatus("");
      document.getElementById("overallVal").textContent = "—";
      document.getElementById("dimensionResults").innerHTML = "";
      renderSAWAnsweredCount();
    };
  });

  document.querySelectorAll(".sawRating").forEach(sel=>{
    sel.onchange = () => {
      const id = sel.dataset.want;
      const alt = sel.dataset.alt;
      const w = state.saw.wants.find(x=>x.id===id);
      if(w){ w.ratings[alt] = Number(sel.value); }
      state.calculated = false;
      setStatus("");
      document.getElementById("overallVal").textContent = "—";
      document.getElementById("dimensionResults").innerHTML = "";
      renderSAWAnsweredCount();
    };
  });

  document.querySelectorAll("button[data-delwant]").forEach(btn=>{
    btn.onclick = () => {
      const id = btn.dataset.delwant;
      state.saw.wants = state.saw.wants.filter(w=>w.id!==id);
      state.calculated = false;
      setStatus("");
      document.getElementById("overallVal").textContent = "—";
      document.getElementById("dimensionResults").innerHTML = "";
      renderSAWTable();
      renderSAWAnsweredCount();
    };
  });
}

function isSAWComplete(){
  const alts = state.saw.alternatives;
  if(state.saw.wants.length === 0) return false;

  for(const w of state.saw.wants){
    if(!w.name || !w.name.trim()) return false;
    if(!Number.isInteger(w.weight) || w.weight < 1 || w.weight > 10) return false;
    for(const a of alts){
      const v = w.ratings[a];
      if(!Number.isInteger(v) || v < 1 || v > 10) return false;
    }
  }
  return true;
}

function computeSAWTotals(){
  const totals = {};
  state.saw.alternatives.forEach(a=>totals[a]=0);
  state.saw.wants.forEach(w=>{
    state.saw.alternatives.forEach(a=>{
      totals[a] += Number(w.weight) * Number(w.ratings[a]);
    });
  });
  return totals;
}

function renderSAWAnsweredCount(){
  if(state.saw.wants.length === 0){
    setAnsweredCount(0, 1);
    return;
  }
  setAnsweredCount(isSAWComplete() ? 1 : 0, 1);
}

function renderSAWResults(){
  const totals = computeSAWTotals();
  const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  if(entries.length === 0) return;

  document.getElementById("overallLabel").textContent = "Top alternative";
  document.getElementById("overallVal").textContent = `${entries[0][0]} (${entries[0][1]})`;

  document.getElementById("dimensionResults").innerHTML = entries.map(([name,val])=>`
    <div class="kv">
      <div class="k">${escapeHtml(name)}</div>
      <div class="v">${val}</div>
    </div>
  `).join("");

  renderSAWTable();
}

function openPDF(){
  const w = window.open("", "_blank");

  }
  w.document.open();
  w.document.write(buildReportHTML());

}

/* =========================================================
   Calculate / PDF / Reset behavior
========================================================= */
function handleCalculate(){
  setStatus("");
  clearResultsPanel();

  const studentName = (document.getElementById("studentName").value || "").trim();
  if (!studentName){
    setStatus(`<span class="err">Student name is required.</span>`);
    return;
  }

  if (state.active === "saw"){
    if (!isSAWComplete()){
      setStatus(`<span class="err">Please add at least one want and select all weights/ratings (1–10) for every cell.</span>`);
      return;
    }
    state.calculated = true;
    setStatus(`<span class="ok">Thanks for completing!</span>`);
    renderSAWResults();
    return;
  }

  const total = (state.active === "ibq") ? 44 : 20;
  const answered = countAnsweredLikert(total);
  setAnsweredCount(answered, total);

  if (answered !== total){
    setStatus(`<span class="err">Please answer all items (1–5).</span>`);
    return;
  }

  const r = getLikertResponses(total);
  const res = (state.active === "ibq") ? computeIBQ(r) : computeConflict(r);

  state.calculated = true;
  renderLikertResults(res);
  setStatus(`<span class="ok">Thanks for completing!</span>`);
}

function handleDownloadPDF(){
  setStatus("");

  if (!state.calculated){
    setStatus(`<span class="err">Please click Calculate first.</span>`);
    return;
  }

  if (state.active === "saw"){
    if (!isSAWComplete()){
      setStatus(`<span class="err">Please complete all wants/weights/ratings and click Calculate again.</span>`);
      return;
    }
  } else {
    const total = (state.active === "ibq") ? 44 : 20;
    if (countAnsweredLikert(total) !== total){
      setStatus(`<span class="err">Please complete all items and click Calculate again.</span>`);
      return;
    }
  }

  openPDF();
}

function handleReset(){
  state.calculated = false;
  setStatus("");
  clearResultsPanel();

  if (state.active === "saw"){
    state.saw = { alternatives: ["Finance","Leadership","Design","Advertising"], wants: [] };
    renderScale(SAW_SCALE);
    renderSAW();
    return;
  }

  renderActive();
}

/* =========================================================
   Main render switch
========================================================= */
function renderActive(){
  state.calculated = false;
  setStatus("");
  clearResultsPanel();

  if (state.active === "ibq"){
    renderScale(IBQ_SCALE);
    renderLikertSurvey("ibq");
    setAnsweredCount(0, 44);
  } else if (state.active === "conflict"){
    renderScale(CONFLICT_SCALE);
    renderLikertSurvey("conflict");
    setAnsweredCount(0, 20);
  } else {
    renderScale(SAW_SCALE);
    renderSAW();
  }
}

/* -------------------- Wiring -------------------- */
document.getElementById("assessmentSelect").addEventListener("change", (e)=>{
  state.active = e.target.value;
  renderActive();
});

document.getElementById("btnCalc").addEventListener("click", handleCalculate);
document.getElementById("btnPDF").addEventListener("click", handleDownloadPDF);
document.getElementById("btnReset").addEventListener("click", handleReset);
